<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic SDLC Dashboard (OAP team)</title>
<link rel="stylesheet" href="styles.css?v=4">
<link rel="stylesheet" href="layered-architecture.css?v=8">
<link rel="stylesheet" href="performance-metrics.css">
<link rel="stylesheet" href="pipeline-flow2.css?v=2">
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>Agentic SDLC Dashboard (OAP team)</h1>
  
    </div>
  </div>
  <div class="header-tabs">
    <div class="tab-segment">
      <button class="tab-btn active" data-tab="overview">Overview</button>
      <button class="tab-btn" data-tab="certmanager">Cert Manager</button>
      <button class="tab-btn" data-tab="ztwim">ZTWIM</button>
      <button class="tab-btn" data-tab="sscso">SSCSI</button>
      <button class="tab-btn" data-tab="mustgather">Must Gather</button>
      <button class="tab-btn" data-tab="eso">ESO</button>
      <button class="tab-btn" data-tab="linksrepos">Links and Repos</button>
    </div>
  </div>
</div>

<!-- Tab panels (content loaded dynamically from tabs/ directory) -->
<div id="tab-overview" class="tab-panel active"></div>
<div id="tab-eso" class="tab-panel"></div>
<div id="tab-mustgather" class="tab-panel"></div>
<div id="tab-sscso" class="tab-panel"></div>
<div id="tab-ztwim" class="tab-panel"></div>
<div id="tab-certmanager" class="tab-panel"></div>
<div id="tab-linksrepos" class="tab-panel"></div>

<button id="backToTop" class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top">Back to Top</button>

<div class="footer">
  OpenSpec Dashboard | AI-Powered Operator Development
</div>

<script src="app.js"></script>
</body>
</html>
